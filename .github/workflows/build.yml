name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Android APK ──────────────────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/release-key.jks

      - name: Write key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=release\nstoreFile=release-key.jks\n' \
            "${{ secrets.KEY_PASSWORD }}" \
            "${{ secrets.KEY_PASSWORD }}" \
            > android/key.properties

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/FarkleFrenzy-${{ github.ref_name }}.apk

      - name: Create release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Farkle Frenzy ${{ github.ref_name }}"
          files: build/app/outputs/flutter-apk/FarkleFrenzy-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Windows EXE ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Patch Flutter VS version detection
        shell: pwsh
        run: |
          $file = "C:\hostedtoolcache\windows\flutter\stable-3.35.4-x64\flutter\packages\flutter_tools\lib\src\windows\visual_studio.dart"
          $content = Get-Content $file -Raw
          $old = "17 => 'Visual Studio 17 2022',"
          $new = "17 => 'Visual Studio 17 2022'," + "`n      18 => 'Visual Studio 18 2026',"
          $content = $content.Replace($old, $new)
          Set-Content $file $content -NoNewline
          Write-Host "Patched visual_studio.dart"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip release folder
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "FarkleFrenzy-Windows-${{ github.ref_name }}.zip"

      - name: Upload Windows build to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Farkle Frenzy ${{ github.ref_name }}"
          files: FarkleFrenzy-Windows-${{ github.ref_name }}.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
